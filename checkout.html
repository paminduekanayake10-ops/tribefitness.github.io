<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | TribeFitness</title>
<link rel="stylesheet" href="style1.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet"/>
<style>
.payment-section { display:none; margin-top:10px; }
.checkout-product { display:flex; align-items:center; margin-bottom:10px; }
.checkout-info { margin-left:10px; }
.order-total { font-weight:bold; margin-top:10px; }
</style>
</head>
<body>

<header>
<nav class="nav">
    <div class="container">
        <div class="left-side-header">
            <a href="index.html" class="logo">
                <img src="resources/image/Designer.png" alt="logo">
            </a>
            <a href="index.html" class="head">FitnessTribe</a>
        </div>
        <div class="hamburger" id="hamburger">
            <i class="ri-menu-line"></i>
        </div>
        <div class="right-side-header nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="membership.html">Membership</a>
            <a href="PHP/shop.php">Shop</a>
            <a href="about-us.html">About Us</a>
        </div>
    </div>
</nav>
</header>

<h1 class="checkout-title">Checkout</h1>

<h2 class="section-subtitle">Your Order Summary</h2>
<div id="checkout-items"></div>
<hr>

<h2 class="section-subtitle">Billing Details</h2>
<form id="checkout-form" action="PHP/checkout.php" method="POST" enctype="multipart/form-data">

<div class="row">
    <label>First Name</label>
    <input type="text" name="first_name" required>
    <label>Last Name</label>
    <input type="text" name="last_name" required>
</div>

<div class="row">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Phone Number</label>
    <input type="text" name="phone" required>
</div>

<div class="row">
    <label>City</label>
    <input type="text" name="city" required>
    <label>Postal Code</label>
    <input type="text" name="postal" required>
</div>

<div class="row">
    <label>Address</label>
    <input type="text" name="address" required>
</div>

<div class="row notes-row">
    <label>Order Notes (optional)</label>
    <textarea name="order_notes" placeholder="Any special instructions?"></textarea>
</div>

<label>Payment Method</label>
<select name="payment_method" id="payment_method" class="payment_method" required>
    <option value="">Select Option</option>
    <option value="card">Card Payment</option>
    <option value="bank">Bank Transfer</option>
    <option value="cash-on-delivery">Cash On Delivery</option>
</select>

<div id="card" class="payment-section" style="display:none;">
        <label>Card Number:</label><input type="text" name="card_number" maxlength="16">
        <label>Expiry Date:</label><input type="month" name="expiry_date">
        <label>CVV:</label><input type="text" name="cvv" maxlength="3">
</div>

<div id="bank" class="payment-section">
    <label>Upload Payment Proof (Image/Screenshot, or pdf)</label>
    <input type="file" name="payment_proof" id="payment_proof" accept="image/*,.pdf">
    <div id="preview" style="margin-top:10px;"></div>
    <p class="instruction">Upload screenshot or receipt for bank transfer.</p>
</div>

<hr>

<h2 class="section-subtitle">Grand Total</h2>
<div id="order-total" class="order-total">Rs.0.00</div>

<!-- Hidden inputs for PHP -->
<div id="hidden-products"></div>

<button type="submit" disabled class="btn-buy">Place Order</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("checkout-items");
    const hiddenContainer = document.getElementById("hidden-products");
    const totalElement = document.getElementById("order-total");
    const submitBtn = document.querySelector('button[type="submit"]');

    // Normalize images for XAMPP and live
    function normalizeImg(path) {
    if (!path) return "resources/image/placeholder.png";

    // Remove any ../ or ./
    path = path.replace(/(\.\.\/|\.\\)/g, '');
    
    // Force forward slashes
    path = path.replace(/\\/g, '/');

    return "resources/image/" + path.split('/').pop();
}


    // Render cart from localStorage
    function renderCart() {
        const stored = localStorage.getItem("cart");
        if (!stored) {
            alert("Your cart is empty!");
            window.location.href = "PHP/shop.php";
            return;
        }

        const cart = JSON.parse(stored);
        container.innerHTML = "";
        hiddenContainer.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = "<p>Your cart is empty.</p>";
            totalElement.textContent = "Rs.0.00";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.style.cursor = "not-allowed";
            return;
        }

        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.cursor = "pointer";

        cart.forEach(item => {
            total += item.qty * item.price;

            const box = document.createElement("div");
            box.classList.add("checkout-product");
            box.innerHTML = `
                <img src="${normalizeImg(item.imgSrc)}" 
                     alt="${item.name}" 
                     style="width:80px; height:80px; object-fit:cover;">
                <div class="checkout-info">
                    <p><strong>${item.name}</strong></p>
                    <p>Quantity: ${item.qty}</p>
                    <p>Price: Rs.${item.price}</p>
                </div>
            `;
            container.appendChild(box);

            // Hidden inputs for PHP
            const inputs = [
                { name: 'product_id[]', value: item.id },
                { name: 'product_name[]', value: item.name },
                { name: 'qty[]', value: item.qty },
                { name: 'price[]', value: item.price }
            ];
            inputs.forEach(inp => {
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = inp.name;
                hidden.value = inp.value;
                hiddenContainer.appendChild(hidden);
            });
        });

        totalElement.textContent = "Rs." + total.toFixed(2);
    }

    renderCart();

    // Payment toggle
    const paymentSections = document.querySelectorAll('.payment-section');
    document.getElementById("payment_method").addEventListener("change", function () {
        const selected = this.value;
        paymentSections.forEach(sec => sec.style.display = 'none');
        if (selected === 'card') document.getElementById('card').style.display = 'block';
        if (selected === 'bank') document.getElementById('bank').style.display = 'block';
    });

    // Card payment redirect simulation
    document.getElementById("card-pay-btn")?.addEventListener("click", () => {
        alert("This will redirect to a payment gateway in production.");
    });

   const proofInput = document.getElementById('payment_proof');
const previewDiv = document.getElementById('preview');

proofInput.addEventListener('change', () => {
    previewDiv.innerHTML = ""; // clear previous preview
    const file = proofInput.files[0];
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    const fileInfo = document.createElement('p');
    fileInfo.style.marginTop = '5px';
    fileInfo.textContent = `File: ${file.name} (${(file.size/1024).toFixed(2)} KB)`;

    if (['jpg','jpeg','png','gif'].includes(ext)) {
        // Image thumbnail
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.maxWidth = '150px';
        img.style.maxHeight = '150px';
        img.style.border = '1px solid #ccc';
        img.style.padding = '5px';
        previewDiv.appendChild(img);
        previewDiv.appendChild(fileInfo);
    } else if (ext === 'pdf') {
        // PDF link
        const link = document.createElement('a');
        link.href = URL.createObjectURL(file);
        link.target = "_blank";
        link.textContent = "Preview PDF";
        link.style.display = 'block';
        link.style.marginTop = '5px';
        previewDiv.appendChild(link);
        previewDiv.appendChild(fileInfo);
    } else {
        previewDiv.textContent = "Unsupported file type";
    }
});


    // Hamburger menu
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("nav-links");
    hamburger?.addEventListener("click", () => navLinks.classList.toggle("active"));
});
</script>

</body>
</html>
